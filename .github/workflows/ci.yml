name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma clients
        run: |
          cd services/games && bun run prisma:generate
          cd ../wallets && bun run prisma:generate

      - name: Run contracts tests
        run: cd packages/contracts && bun test

      - name: Run wallets unit tests
        run: cd services/wallets && bun test tests/unit

      - name: Run games unit tests
        run: cd services/games && bun test tests/unit

      - name: Run frontend tests
        run: cd frontend && bun test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma clients
        run: |
          cd services/games && bun run prisma:generate
          cd ../wallets && bun run prisma:generate

      - name: Start Docker Compose
        run: |
          for attempt in 1 2 3; do
            docker compose up --build -d && break
            echo "Attempt $attempt failed, retrying in 10s..."
            docker compose down 2>/dev/null || true
            sleep 10
          done

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services via HTTP health checks..."
          for i in $(seq 1 90); do
            GAMES=$(curl -sf -o /dev/null http://localhost:8000/games/health 2>/dev/null && echo "ok" || echo "")
            WALLETS=$(curl -sf -o /dev/null http://localhost:8000/wallets/health 2>/dev/null && echo "ok" || echo "")
            FRONTEND=$(curl -sf -o /dev/null http://localhost:3000 2>/dev/null && echo "ok" || echo "")
            if [ "$GAMES" = "ok" ] && [ "$WALLETS" = "ok" ] && [ "$FRONTEND" = "ok" ]; then
              echo "All services healthy!"
              break
            fi
            echo "Attempt $i/90: games=$GAMES wallets=$WALLETS frontend=$FRONTEND"
            sleep 5
          done
          curl -sf http://localhost:8000/games/health || (echo "Games health check failed" && exit 1)
          curl -sf http://localhost:8000/wallets/health || (echo "Wallets health check failed" && exit 1)
          curl -sf http://localhost:3000 || (echo "Frontend health check failed" && exit 1)
          echo "All health checks passed!"

      - name: Run Games E2E tests
        run: |
          cd services/games
          DATABASE_URL=postgresql://admin:admin@localhost:5432/games \
          RABBITMQ_URL=amqp://admin:admin@localhost:5672 \
          KEYCLOAK_URL=http://localhost:8080 \
          KEYCLOAK_REALM=crash-game \
          bun test tests/e2e

      - name: Run Wallets E2E tests
        run: |
          cd services/wallets
          DATABASE_URL=postgresql://admin:admin@localhost:5432/wallets \
          RABBITMQ_URL=amqp://admin:admin@localhost:5672 \
          KEYCLOAK_URL=http://localhost:8080 \
          KEYCLOAK_REALM=crash-game \
          bun test tests/e2e

      - name: Tear down
        run: docker compose down
